<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Imperial Print OS</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./index.js" defer></script>
  </head>
  <body>
    <main class="app">
      <header class="app-header">
        <div>
          <p class="eyebrow">Imperial Infusions</p>
          <h1>Print OS</h1>
        </div>
        <div class="version-pill">v0.2.0</div>
      </header>

      <section class="panel-card">
        <div class="section-header">
          <div>
            <h2>Prep</h2>
            <p>Build/update PRINT_PREP from selected ORIGINAL artwork.</p>
          </div>
        </div>

        <label for="garment">Garment</label>
        <select id="garment">
          <option value="tee">Tee</option>
          <option value="hoodie">Hoodie</option>
          <option value="tote">Tote</option>
          <option value="denim_jacket">Denim Jacket</option>
          <option value="jeans">Jeans</option>
        </select>

        <label for="zone">Print Zone</label>
        <select id="zone">
          <option value="full_front">Full Front</option>
          <option value="full_back">Full Back</option>
          <option value="left_chest">Left Chest</option>
          <option value="sleeve_left">Left Sleeve</option>
          <option value="sleeve_right">Right Sleeve</option>
        </select>

        <label for="ink">Ink Profile</label>
        <select id="ink">
          <option value="1c_dark">1 Colour on Dark</option>
          <option value="2c_dark">2 Colour on Dark</option>
          <option value="3c_dark">3 Colour on Dark</option>
          <option value="4c_dark">4 Colour on Dark</option>
        </select>

        <label for="printSetup">Print Setup Preset</label>
        <select id="printSetup">
          <option value="a3_positive_300">A3 Positive — 300 DPI</option>
          <option value="a4_positive_300">A4 Positive — 300 DPI</option>
          <option value="a4_tiled_300">A4 Tiled Positive — 300 DPI</option>
        </select>

        <label for="meshProfile">Mesh Profile</label>
        <select id="meshProfile">
          <option value="43t_standard">43T — Standard / Bold Detail</option>
          <option value="55t_detail">55T — Medium Detail</option>
          <option value="77t_fine">77T — Fine Detail</option>
        </select>

        <div class="button-row">
          <button id="runPreflight" class="secondary-btn">
            Run Preflight Check
          </button>
          <button
            id="runPrep"
            class="primary-btn"
            style="display: block; min-height: 34px"
          >
            Run Prep
          </button>
          <button id="validatePrint" class="secondary-btn">
            Validate Print Output
          </button>
          <button id="toggleOriginals" class="secondary-btn">
            Toggle Originals Visibility
          </button>
          <button
            id="rebuildPrep"
            class="secondary-btn"
            style="display: block; min-height: 34px"
          >
            Rebuild from Original
          </button>
        </div>
      </section>

      <section class="panel-card">
        <div class="section-header">
          <div>
            <h2>Distress</h2>
            <p>
              Level naming only (collection logic can be warning-only later).
            </p>
          </div>
        </div>

        <label for="distressLevel">Distress Level</label>
        <select id="distressLevel">
          <option value="level_0_clean">Level 0 — Clean</option>
          <option value="level_1_faded">Level 1 — Faded</option>
          <option value="level_2_worn">Level 2 — Worn</option>
          <option value="level_3_distressed">Level 3 — Distressed</option>
        </select>

        <label for="amount">Amount</label>
        <input id="amount" type="range" min="0" max="100" value="50" />
        <div class="range-readout">
          <span>0</span><strong id="amountValue">50</strong><span>100</span>
        </div>

        <button id="previewDistress" class="secondary-btn">
          Preview Distress
        </button>
      </section>

      <section class="panel-card">
        <div class="section-header compact">
          <h2>Status</h2>
        </div>
        <pre id="out">Ready.</pre>
      </section>
    </main>
  </body>
</html>
